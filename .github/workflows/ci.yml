name: CI

# push 到 main / 開 PR 時,跑型別檢查(build)+ 全套回歸測試。
# 綠燈才代表這次改動沒有打壞既有系統——接手的模型改完務必等 CI 通過再收工。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # 遊戲用本地時區的 getHours()/getDate() 決定作息與換日,設計基準是 +08:00
    # (GAME_START),開發者也在 UTC+8。CI runner 預設 UTC → 作息整段位移 8 小時、
    # 時段型互動/換日全歪掉,測試會假性失敗。固定時區讓 CI 與設計基準一致。
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build（等同型別檢查）
        run: npm run build
      - name: 回歸測試（scripts/run-all.ts）
        run: npm test
